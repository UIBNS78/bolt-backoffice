<div class="flex flex-col gap-4">
    <div class="flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-xl text-blue-950">Livraisons</h1>
            <p class="text-gray-400">Un aperçu détaillé de l'historique et du statut de tous les colis.</p>
        </div>
        <app-deliveries-count></app-deliveries-count>
    </div>    
    <div class="flex gap-3 h-[calc(100vh-120px)]">
        <div class="flex flex-col gap-2 border rounded-xl border-gray-200 flex-1 p-4">
            <div class="flex justify-between items-center">
                <h1 class="text-gray-400">Liste des livraisons</h1>
                <div class="flex justify-end gap-2">
                    <!-- <p-button icon="pi pi-refresh" size="small" severity="secondary" variant="outlined" pTooltip="Rafraîchir la liste" tooltipPosition="top" /> -->
                    <a routerLink="/deliveries/create" pButton icon="pi pi-plus" size="small" severity="contrast" pTooltip="Nouvelle livraison" tooltipPosition="top"></a>
                </div>
            </div>
            <app-deliveries-list (onSelectEmitter)="handleOnSelectDelivery($event)"></app-deliveries-list>
        </div>
        <div class="flex flex-col gap-2 border rounded-xl border-gray-200 p-4 flex-3">
            <app-delivery-packages-list [delivery]="selectedDelivery()" (loadDeliveryEmitter)="handleReloadDeliveries()"></app-delivery-packages-list>
        </div>
    </div>
</div>
