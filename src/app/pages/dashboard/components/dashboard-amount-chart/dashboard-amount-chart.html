<div class="flex flex-col gap-2">
    <p-selectbutton 
        [options]="[
            { label: 'Semaine', value: 'week' },
            { label: 'Mois', value: 'month' },
            { label: 'Année', value: 'year' }
        ]" 
        [(ngModel)]="state" 
        optionLabel="label" 
        optionValue="value" 
        [unselectable]="true"
        size="small"
    >
        <ng-template #item let-item>
            <small class="font-bold">{{ item.label }}</small>
        </ng-template>
    </p-selectbutton>
    <div class="flex flex-col gap-4 border rounded-xl border-gray-200 flex-1 p-4">
        <p class="font-bold">Graphique</p>
        <p-chart type="bar" [data]="data" [options]="options" class="h-[16rem]" />
    </div>
</div>
