<div class="flex flex-col gap-6 py-8">
    <div class="flex flex-col">
        <h1 class="text-xl">Bienvenue</h1>
        <p class="text-gray-500">Connectez-vous pour accéder à votre tableau de bord</p>
    </div>
    <form>
        <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label for="email">Email</label>
                <input type="email" pInputText pSize="small" id="email" name="email" required>
            </div>
            <div class="flex flex-col gap-2">
                <div class="flex flex-col gap-1">
                    <label for="password">Mot de passe</label>
                    <input type="password" pInputText pSize="small" id="password" name="password" required>
                </div>
                <div class="flex justify-end">
                    <p-button label="Mot de passe oublié ?" link size="small"></p-button>
                </div>
            </div>
            <p-button label="Se connecter" severity="info" size="small" styleClass="w-full"></p-button>
        </div>
    </form>
</div>
